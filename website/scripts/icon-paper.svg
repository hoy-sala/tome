<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Paper tile gradient — lighter cream at top, slightly warmer/darker at
         bottom for the same "rounded surface" feel as the ink variant. -->
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fbf6ec"/>
      <stop offset="100%" stop-color="#ebe2d1"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="rim" cx="0.5" cy="-0.15" r="0.85">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="tileShape">
      <rect width="1024" height="1024" rx="224"/>
    </clipPath>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#tile)"/>
  <g clip-path="url(#tileShape)">
    <rect width="1024" height="1024" fill="url(#rim)"/>
    <rect width="1024" height="1024" fill="url(#gloss)"/>
  </g>
  <g transform="translate(150 150) scale(11.5)">
    <path d="M4 18 Q 4 14 8 14 L 28 18 Q 32 19 32 22 Q 32 19 36 18 L 56 14 Q 60 14 60 18 L 60 46 Q 60 49 56 49 L 36 49 Q 32 50 32 52 Q 32 50 28 49 L 8 49 Q 4 49 4 46 Z" stroke="#1a1714" stroke-width="5" stroke-linejoin="round" fill="none"/>
    <line x1="32" y1="22" x2="32" y2="52" stroke="#1a1714" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
